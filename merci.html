<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci — Les Vols de Ralph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --nuit: #141d33; --indigo: #1f2e52; --or: #e4a94a;
    --ecru: #f4eedd; --ecru-dim: #cfc6ad; --line: rgba(244,238,221,0.14);
  }
  body{
    margin:0; background:var(--nuit); color:var(--ecru);
    font-family:'Work Sans', sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  .card{
    background:var(--indigo); border:1px solid var(--line); border-radius:14px;
    padding:48px 36px; max-width:480px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; color:var(--or);
    letter-spacing:0.14em; text-transform:uppercase; font-size:0.75rem;
    display:block; margin-bottom:14px;
  }
  h1{font-family:'Fraunces', serif; font-size:1.8rem; margin:0 0 16px;}
  p{color:var(--ecru-dim); line-height:1.6;}
  a.btn{
    display:inline-block; margin-top:24px; background:var(--or); color:var(--nuit);
    text-decoration:none; font-weight:700; padding:12px 26px; border-radius:9px;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Thank you</span>
    <h1>Merci d'avoir choisi Les Vols de Ralph !</h1>
    <p>N'oublie pas de vérifier ta boîte mail pour recevoir nos meilleures offres vers l'Afrique de l'Ouest.</p>
    <a class="btn" href="index.html">Continuer →</a>
  </div>
</body>
</html>
