<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci — Les Vols de Ralph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@700;800;900&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101010; --yellow:#f0e14a; --orange:#d97b3f; --text-light:#8fa3b8; --line: rgba(240,225,74,0.18);
  }
  body{
    margin:0; background:var(--bg); color:var(--text-light);
    font-family:'Poppins', sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  .card{background:#000; border:1px solid var(--line); border-radius:10px; padding:48px 36px; max-width:480px;}
  .label{color:var(--orange); font-weight:800; text-transform:uppercase; letter-spacing:0.14em; font-size:0.78rem; display:block; margin-bottom:14px;}
  h1{
    font-family:'Lexend Deca', sans-serif; font-weight:800; text-transform:uppercase;
    color:var(--yellow); font-size:1.6rem; margin:0 0 16px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.55), 0 6px 18px rgba(0,0,0,0.35);
  }
  p{line-height:1.6;}
  a.btn{display:inline-block; margin-top:24px; background:var(--yellow); color:#000; text-decoration:none; font-weight:900; text-transform:uppercase; letter-spacing:0.04em; padding:13px 28px; border-radius:6px;}
</style>
</head>
<body>
  <div class="card">
    <span class="label">Thank you</span>
    <h1>Merci d'avoir choisi Les Vols de Ralph !</h1>
    <p>N'oublie pas de vérifier ta boîte mail pour recevoir nos meilleures offres vers l'Afrique de l'Ouest.</p>
    <a class="btn" href="index.html">Continuer →</a>
  </div>
</body>
</html>
